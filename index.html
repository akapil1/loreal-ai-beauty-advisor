<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L’Oréal Product Advisor</title>

    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <header class="site-header">
        <div class="brand-card">
          <div class="brand-row">
            <img
              src="img/loreal-logo.png"
              alt="L'Oréal logo"
              class="brand-logo"
            />

            <div class="brand-copy">
              <p class="brand-kicker">Beauty Tech Assistant</p>
              <h1 class="site-title">L’Oréal Product Advisor</h1>
              <p class="site-subtitle">
                Personalized skincare, makeup, haircare, fragrance, and beauty
                routine guidance in a premium conversational experience.
              </p>
            </div>
          </div>
        </div>
      </header>

      <main>
        <section class="chatbox" aria-label="L’Oréal chatbot">
          <div id="latestQuestion" class="latest-question hidden"></div>

          <div
            id="chatWindow"
            class="chat-window"
            aria-live="polite"
            aria-label="Chat conversation"
          ></div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask about products, ingredients, routines, or beauty goals..."
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn" aria-label="Send message">
              <span class="material-icons">arrow_forward</span>
            </button>
          </form>
        </section>
      </main>

      <footer class="site-footer">
        <p>Inspired by L’Oréal’s beauty-first digital brand experience.</p>
        <nav>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
